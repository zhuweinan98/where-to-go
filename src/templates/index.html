<!DOCTYPE html>
<!--
  前端聊天页（Week 1）
  职责：展示 UI；用 fetch POST /chat 把 message、city 发给后端；把 JSON 里的 reply 显示出来。
  说明：样式与脚本内联在本文件，无单独打包构建。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>今天去哪玩</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 20px 40px;
      background: #f5f5f5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    label { font-size: 0.9rem; color: #555; }
    select, input[type="text"] {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    input[type="text"] { flex: 1; min-width: 180px; }
    .chat-box {
      border: 1px solid #ddd;
      padding: 16px;
      height: 400px;
      overflow-y: auto;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .user {
      color: #1890ff;
      text-align: right;
      padding: 10px 12px;
      background: #e6f7ff;
      border-radius: 10px;
      margin: 8px 0;
      white-space: pre-wrap;
    }
    .bot {
      color: #389e0d;
      padding: 10px 12px;
      background: #f6ffed;
      border-radius: 10px;
      margin: 8px 0;
      white-space: pre-wrap;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #1890ff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    /* chip 也是 button，须覆盖全局 button 的白字，否则会白底白字看不见 */
    button.chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #262626;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button.chip:hover {
      border-color: #1890ff;
      color: #1890ff;
      background: #e6f7ff;
    }
    .err { color: #cf1322; font-size: 0.875rem; margin-top: 8px; }
    .debug-panel {
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      margin-top: 12px;
      overflow: hidden;
    }
    .debug-panel summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 600;
      color: #595959;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }
    .debug-log {
      margin: 0;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      color: #262626;
      max-height: 240px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
  </style>
</head>
<body>
  <h1>🗺️ 今天去哪玩</h1>
  <div class="row">
    <label for="city">城市</label>
    <select id="city" name="city">
      <option value="上海">上海</option>
      <option value="北京">北京</option>
      <option value="广州">广州</option>
      <option value="沈阳">沈阳</option>
      <option value="石家庄">石家庄</option>
      <option value="盘锦" selected>盘锦</option>
    </select>
  </div>
  <div class="chips" id="chips">
    <button type="button" class="chip" data-msg="你好">你好</button>
    <button type="button" class="chip" data-msg="今天天气怎么样">今天天气</button>
    <button type="button" class="chip" data-msg="推荐去哪里玩">推荐去哪</button>
    <button type="button" class="chip" data-msg="下雨天推荐">雨天推荐</button>
  </div>
  <div class="chat-box" id="chat"></div>
  <form id="form">
    <div class="row">
      <input type="text" id="message" name="message" placeholder="问点什么…" autocomplete="off" />
      <button type="submit" id="send">发送</button>
    </div>
  </form>
  <div class="err" id="err" hidden></div>
  <details class="debug-panel" id="debug-panel" open>
    <summary>调试日志（最近一次请求）</summary>
    <pre class="debug-log" id="debug-log">暂无调试数据</pre>
  </details>
  <script>
    const chatEl = document.getElementById('chat');
    const form = document.getElementById('form');
    const messageEl = document.getElementById('message');
    const cityEl = document.getElementById('city');
    const sendBtn = document.getElementById('send');
    const errEl = document.getElementById('err');
    const debugLogEl = document.getElementById('debug-log');
    const debugPanelEl = document.getElementById('debug-panel');
    const LOADING_HINT = {{ llm_loading_hint_json | safe }};
    const INITIAL_MESSAGE = {{ initial_message_json | safe }};
    const INITIAL_CITY = {{ initial_city_json | safe }};
    const LLM_DEBUG_ENABLED = {{ llm_debug_enabled_json | safe }};
    if (!LLM_DEBUG_ENABLED) debugPanelEl.hidden = true;

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = !msg;
    }

    async function sendMessage(text) {
      const msg = (text ?? messageEl.value).trim();
      if (!msg) return;
      showErr('');
      chatEl.innerHTML += `<p class="user">你：${escapeHtml(msg)}</p>`;
      messageEl.value = '';
      chatEl.scrollTop = chatEl.scrollHeight;
      sendBtn.disabled = true;
      const loadingId = 'bot-loading-' + Date.now();
      chatEl.innerHTML += `<p class="bot" id="${loadingId}">${escapeHtml(LOADING_HINT)}</p>`;
      chatEl.scrollTop = chatEl.scrollHeight;
      try {
        const data = LLM_DEBUG_ENABLED
          ? await sendMessageStream(msg, cityEl.value)
          : await sendMessagePlain(msg, cityEl.value);
        document.getElementById(loadingId)?.remove();
        if (LLM_DEBUG_ENABLED) renderDebugTrace(data.debug_trace);
        const raw = data.reply != null ? String(data.reply) : '';
        const replyText = raw.trim() ? raw : '（没有收到回复内容）';
        chatEl.innerHTML += `<p class="bot">助手：${escapeHtml(replyText)}</p>`;
      } catch (e) {
        document.getElementById(loadingId)?.remove();
        if (LLM_DEBUG_ENABLED) {
          renderDebugTrace([{ event: 'frontend_error', message: String(e.message || '网络错误') }]);
        }
        showErr(e.message || '网络错误');
        chatEl.innerHTML += `<p class="bot">助手：（出错了，请稍后再试）</p>`;
      } finally {
        sendBtn.disabled = false;
        chatEl.scrollTop = chatEl.scrollHeight;
      }
    }

    function sendMessageStream(msg, city) {
      return new Promise((resolve, reject) => {
        const trace = [];
        let done = false;
        const url = `/chat/stream?message=${encodeURIComponent(msg)}&city=${encodeURIComponent(city)}`;
        const es = new EventSource(url);

        es.addEventListener('trace', (ev) => {
          try {
            const item = JSON.parse(ev.data);
            trace.push(item);
            renderDebugTrace(trace);
          } catch (_) {
            // ignore parse error for malformed event payload
          }
        });

        es.addEventListener('final', (ev) => {
          done = true;
          es.close();
          try {
            const payload = JSON.parse(ev.data);
            resolve({ reply: payload.reply ?? '', debug_trace: trace });
          } catch (e) {
            reject(new Error('解析最终回复失败'));
          }
        });

        es.addEventListener('error', () => {
          if (done) return;
          es.close();
          reject(new Error('流式连接中断，请重试'));
        });
      });
    }

    async function sendMessagePlain(msg, city) {
      const body = new URLSearchParams();
      body.set('message', msg);
      body.set('city', city);
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      });
      if (!res.ok) throw new Error('请求失败：' + res.status);
      return await res.json();
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function renderDebugTrace(trace) {
      if (!Array.isArray(trace) || trace.length === 0) {
        debugLogEl.textContent = '暂无调试数据';
        debugLogEl.scrollTop = debugLogEl.scrollHeight;
        return;
      }
      debugPanelEl.open = true;
      debugLogEl.textContent = trace
        .map((item, idx) => `${String(idx + 1).padStart(2, '0')} | ${formatTraceItem(item)}`)
        .join('\n');
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
    }

    function formatTraceItem(item) {
      const ev = item?.event || 'unknown';
      if (ev === 'city_resolved') {
        return `城市解析: 表单=${safe(item.form_city)} -> 生效=${safe(item.effective_city)}`;
      }
      if (ev === 'llm_route') {
        return `路由: LLM_CLIENT=${safe(item.client_kind)}`;
      }
      if (ev === 'fc_start') {
        return `FC启动: mode=${safe(item.mode)} model=${safe(item.model)} base=${safe(item.base_url)} 默认城市=${safe(item.default_city)}`;
      }
      if (ev === 'assistant_round') {
        return `第${safe(item.round)}轮 assistant: tool_calls=${safe(item.tool_calls_count)} content=${safe(item.assistant_content)}`;
      }
      if (ev === 'tool_call') {
        return `调用工具: ${safe(item.name)} args=${safeJson(item.args)}`;
      }
      if (ev === 'tool_result') {
        return `工具结果: ${safe(item.name)} -> ${safe(item.result)}`;
      }
      if (ev === 'tool_error' || ev === 'tool_exception') {
        return `工具异常: ${safe(item.name)} -> ${safe(item.error)}`;
      }
      if (ev === 'final_answer') {
        return `最终回答(第${safe(item.round)}轮): ${safe(item.content)}`;
      }
      if (ev === 'legacy_complete') {
        return `旧链路完成: mode=${safe(item.mode)}`;
      }
      if (ev === 'llm_error') {
        return `LLM错误: ${safe(item.error)}`;
      }
      if (ev === 'rule_weather') {
        return '规则分支: 天气回复';
      }
      if (ev === 'rule_recommend') {
        return `规则分支: 推荐回复(is_rain=${safe(item.is_rain)})`;
      }
      if (ev === 'max_rounds_reached') {
        return `达到最大轮数: ${safe(item.max_rounds)}`;
      }
      if (ev === 'frontend_error') {
        return `前端错误: ${safe(item.message)}`;
      }
      return `${ev}: ${safeJson(item)}`;
    }

    function safe(v) {
      if (v === null || v === undefined) return '-';
      return String(v);
    }

    function safeJson(v) {
      try {
        return JSON.stringify(v, null, 0);
      } catch (_) {
        return String(v);
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });

    document.getElementById('chips').addEventListener('click', (e) => {
      const t = e.target;
      if (t.matches('.chip[data-msg]')) {
        sendMessage(t.getAttribute('data-msg'));
      }
    });

    // 从地址栏 ?message= &city= 带入（UTF-8 百分号编码由服务端已解码；与 uvicorn 日志里的 %XX 不是同一层）
    (function applyQueryDefaults() {
      if (INITIAL_CITY) {
        for (const opt of cityEl.options) {
          if (opt.value === INITIAL_CITY) {
            cityEl.value = INITIAL_CITY;
            break;
          }
        }
      }
      if (INITIAL_MESSAGE) {
        messageEl.value = INITIAL_MESSAGE;
        sendMessage(INITIAL_MESSAGE);
      }
    })();
  </script>
</body>
</html>
