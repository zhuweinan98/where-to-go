<!DOCTYPE html>
<!--
  前端聊天页（Week 1）
  职责：展示 UI；用 fetch POST /chat 把 message、city 发给后端；把 JSON 里的 reply 显示出来。
  说明：样式与脚本内联在本文件，无单独打包构建。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>今天去哪玩</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 20px 40px;
      background: #f5f5f5;
    }
    /* 开启 LLM_DEBUG 时加宽，便于左右双栏调试 */
    body.debug-wide {
      max-width: 1040px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    label { font-size: 0.9rem; color: #555; }
    select, input[type="text"] {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    input[type="text"] { flex: 1; min-width: 180px; }
    .chat-box {
      border: 1px solid #ddd;
      padding: 16px;
      height: 400px;
      overflow-y: auto;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .user {
      color: #1890ff;
      text-align: right;
      padding: 10px 12px;
      background: #e6f7ff;
      border-radius: 10px;
      margin: 8px 0;
      white-space: pre-wrap;
    }
    .bot {
      color: #389e0d;
      padding: 10px 12px;
      background: #f6ffed;
      border-radius: 10px;
      margin: 8px 0;
      white-space: pre-wrap;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #1890ff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    /* chip 也是 button，须覆盖全局 button 的白字，否则会白底白字看不见 */
    button.chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #262626;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button.chip:hover {
      border-color: #1890ff;
      color: #1890ff;
      background: #e6f7ff;
    }
    .err { color: #cf1322; font-size: 0.875rem; margin-top: 8px; }
    .debug-panel {
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      margin-top: 12px;
      overflow: hidden;
    }
    .debug-panel summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 600;
      color: #595959;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }
    .debug-layout {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .debug-col {
      flex: 1 1 300px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #f0f0f0;
    }
    .debug-col:last-child {
      border-right: none;
    }
    .debug-col-title {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #8c8c8c;
      text-transform: uppercase;
      background: #fcfcfc;
      border-bottom: 1px solid #f0f0f0;
    }
    .debug-log {
      margin: 0;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      color: #262626;
      max-height: min(52vh, 420px);
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.45;
    }
    .debug-system-scroll {
      padding: 10px 12px 14px;
      max-height: min(52vh, 420px);
      overflow-y: auto;
      background: #fff;
    }
    .system-panel-meta {
      font-size: 11px;
      color: #8c8c8c;
      line-height: 1.5;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #f6ffed;
      border: 1px solid #d9f7be;
      border-radius: 8px;
    }
    .sys-block {
      margin-bottom: 14px;
    }
    .sys-block:last-child {
      margin-bottom: 0;
    }
    .sys-block-hdr {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      font-weight: 600;
      color: #434343;
      margin: 0 0 6px 0;
      padding: 4px 0;
      border-bottom: 2px solid #1890ff;
      display: inline-block;
      max-width: 100%;
    }
    .sys-block-body {
      margin: 0;
      padding: 12px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.55;
      color: #262626;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: #fafafa;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      max-height: min(36vh, 280px);
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>🗺️ 今天去哪玩</h1>
  <div class="row">
    <label for="city">城市</label>
    <select id="city" name="city">
      <option value="上海">上海</option>
      <option value="北京">北京</option>
      <option value="广州">广州</option>
      <option value="沈阳">沈阳</option>
      <option value="石家庄">石家庄</option>
      <option value="盘锦" selected>盘锦</option>
    </select>
  </div>
  <div class="chips" id="chips">
    <button type="button" class="chip" data-msg="你好">你好</button>
    <button type="button" class="chip" data-msg="今天天气怎么样">今天天气</button>
    <button type="button" class="chip" data-msg="推荐去哪里玩">推荐去哪</button>
    <button type="button" class="chip" data-msg="下雨天推荐">雨天推荐</button>
  </div>
  <div class="chat-box" id="chat"></div>
  <form id="form">
    <div class="row">
      <input type="text" id="message" name="message" placeholder="问点什么…" autocomplete="off" />
      <button type="submit" id="send">发送</button>
    </div>
  </form>
  <div class="err" id="err" hidden></div>
  <details class="debug-panel" id="debug-panel" open>
    <summary>调试（最近一次请求）</summary>
    <div class="debug-layout">
      <div class="debug-col">
        <div class="debug-col-title">事件时间线</div>
        <pre class="debug-log" id="debug-log">暂无调试数据</pre>
      </div>
      <div class="debug-col">
        <div class="debug-col-title">SystemMessage 原文</div>
        <div class="debug-system-scroll" id="debug-system-panels">
          发送一条消息后，若 trace 中含 <code>fc_invoke_system_messages</code>，此处按 slot 分块展示全文（换行保留）。
        </div>
      </div>
    </div>
  </details>
  <script>
    const chatEl = document.getElementById('chat');
    const form = document.getElementById('form');
    const messageEl = document.getElementById('message');
    const cityEl = document.getElementById('city');
    const sendBtn = document.getElementById('send');
    const errEl = document.getElementById('err');
    const debugLogEl = document.getElementById('debug-log');
    const debugPanelEl = document.getElementById('debug-panel');
    const debugSystemPanelsEl = document.getElementById('debug-system-panels');
    const LOADING_HINT = {{ llm_loading_hint_json | safe }};
    const INITIAL_MESSAGE = {{ initial_message_json | safe }};
    const INITIAL_CITY = {{ initial_city_json | safe }};
    const LLM_DEBUG_ENABLED = {{ llm_debug_enabled_json | safe }};
    if (!LLM_DEBUG_ENABLED) debugPanelEl.hidden = true;
    if (LLM_DEBUG_ENABLED) document.body.classList.add('debug-wide');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.hidden = !msg;
    }

    async function sendMessage(text) {
      const msg = (text ?? messageEl.value).trim();
      if (!msg) return;
      showErr('');
      chatEl.innerHTML += `<p class="user">你：${escapeHtml(msg)}</p>`;
      messageEl.value = '';
      chatEl.scrollTop = chatEl.scrollHeight;
      sendBtn.disabled = true;
      const loadingId = 'bot-loading-' + Date.now();
      chatEl.innerHTML += `<p class="bot" id="${loadingId}">${escapeHtml(LOADING_HINT)}</p>`;
      chatEl.scrollTop = chatEl.scrollHeight;
      try {
        const data = LLM_DEBUG_ENABLED
          ? await sendMessageStream(msg, cityEl.value)
          : await sendMessagePlain(msg, cityEl.value);
        document.getElementById(loadingId)?.remove();
        if (LLM_DEBUG_ENABLED) renderDebugTrace(data.debug_trace);
        const raw = data.reply != null ? String(data.reply) : '';
        const replyText = raw.trim() ? raw : '（没有收到回复内容）';
        chatEl.innerHTML += `<p class="bot">助手：${escapeHtml(replyText)}</p>`;
      } catch (e) {
        document.getElementById(loadingId)?.remove();
        if (LLM_DEBUG_ENABLED) {
          renderDebugTrace([{ event: 'frontend_error', message: String(e.message || '网络错误') }]);
        }
        showErr(e.message || '网络错误');
        chatEl.innerHTML += `<p class="bot">助手：（出错了，请稍后再试）</p>`;
      } finally {
        sendBtn.disabled = false;
        chatEl.scrollTop = chatEl.scrollHeight;
      }
    }

    function sendMessageStream(msg, city) {
      return new Promise((resolve, reject) => {
        const trace = [];
        let done = false;
        const url = `/chat/stream?message=${encodeURIComponent(msg)}&city=${encodeURIComponent(city)}`;
        const es = new EventSource(url);

        es.addEventListener('trace', (ev) => {
          try {
            const item = JSON.parse(ev.data);
            trace.push(item);
            renderDebugTrace(trace);
          } catch (_) {
            // ignore parse error for malformed event payload
          }
        });

        es.addEventListener('final', (ev) => {
          done = true;
          es.close();
          try {
            const payload = JSON.parse(ev.data);
            resolve({ reply: payload.reply ?? '', debug_trace: trace });
          } catch (e) {
            reject(new Error('解析最终回复失败'));
          }
        });

        es.addEventListener('error', () => {
          if (done) return;
          es.close();
          reject(new Error('流式连接中断，请重试'));
        });
      });
    }

    async function sendMessagePlain(msg, city) {
      const body = new URLSearchParams();
      body.set('message', msg);
      body.set('city', city);
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      });
      if (!res.ok) throw new Error('请求失败：' + res.status);
      return await res.json();
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function renderDebugTrace(trace) {
      if (!Array.isArray(trace) || trace.length === 0) {
        debugLogEl.textContent = '暂无调试数据';
        debugLogEl.scrollTop = debugLogEl.scrollHeight;
        renderSystemDebugPanel(null);
        return;
      }
      debugPanelEl.open = true;
      debugLogEl.textContent = trace
        .map((item, idx) => `${String(idx + 1).padStart(2, '0')} | ${formatTraceItem(item)}`)
        .join('\n');
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
      renderSystemDebugPanel(trace);
    }

    /** 右侧栏：展示最近一次 fc_invoke_system_messages 里各 SystemMessage 全文，分块 + 独立滚动 */
    function renderSystemDebugPanel(trace) {
      if (!debugSystemPanelsEl) return;
      if (!Array.isArray(trace) || trace.length === 0) {
        debugSystemPanelsEl.textContent =
          '暂无数据。开启 LLM_DEBUG 并走 LangChain FC 后，此处会显示 SystemMessage 分块原文。';
        return;
      }
      const snaps = trace.filter((x) => x && x.event === 'fc_invoke_system_messages');
      if (snaps.length === 0) {
        debugSystemPanelsEl.textContent =
          '本轮 trace 尚无 SystemMessage 快照（仅 ollama/openai + chat_with_tools 路径会写入 fc_invoke_system_messages）。';
        return;
      }
      const item = snaps[snaps.length - 1];
      const blocks = Array.isArray(item.system_blocks) ? item.system_blocks : [];
      debugSystemPanelsEl.replaceChildren();

      const meta = document.createElement('div');
      meta.className = 'system-panel-meta';
      const line1 = document.createElement('div');
      const s1 = document.createElement('strong');
      s1.textContent = '当前展示';
      line1.appendChild(s1);
      line1.appendChild(
        document.createTextNode(
          '：最后一次 invoke 前的快照（多轮 tool 时一般为 round 最大的一条）。'
        )
      );
      const line2 = document.createElement('div');
      line2.style.marginTop = '6px';
      line2.style.fontFamily =
        'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace';
      line2.style.fontSize = '11px';
      line2.style.color = '#595959';
      line2.textContent = `round=${String(item.round ?? '-')} · total_messages=${String(item.total_messages ?? '-')} · roles=${String(item.roles ?? '-')}`;
      meta.appendChild(line1);
      meta.appendChild(line2);
      debugSystemPanelsEl.appendChild(meta);

      if (blocks.length === 0) {
        const empty = document.createElement('p');
        empty.style.margin = '0';
        empty.style.fontSize = '12px';
        empty.style.color = '#8c8c8c';
        empty.textContent = '该快照中 system_blocks 为空。';
        debugSystemPanelsEl.appendChild(empty);
        return;
      }

      blocks.forEach((b, idx) => {
        const section = document.createElement('section');
        section.className = 'sys-block';
        const hdr = document.createElement('h3');
        hdr.className = 'sys-block-hdr';
        hdr.textContent = `#${idx + 1}  ${safe(b.slot)}  ·  ${safe(b.chars)} 字`;
        const pre = document.createElement('pre');
        pre.className = 'sys-block-body';
        const raw = b.full_text != null && String(b.full_text).length > 0 ? b.full_text : b.preview;
        pre.textContent = raw != null && String(raw).length > 0 ? String(raw) : '（空）';
        section.appendChild(hdr);
        section.appendChild(pre);
        debugSystemPanelsEl.appendChild(section);
      });
    }

    function formatTraceItem(item) {
      const ev = item?.event || 'unknown';
      if (ev === 'city_resolved') {
        return `✅ 城市解析成功：effective_city=${safe(item.effective_city)}（来自表单或默认）`;
      }
      if (ev === 'llm_route') {
        return `✅ 路由成功：client_kind=${safe(item.client_kind)} path=chat_with_tools（LangChain FC + tool_calls）`;
      }
      if (ev === 'fc_start') {
        return (
          `✅ FC启动成功：mode=${safe(item.mode)} model=${safe(item.model)} ` +
          `base_url=${safe(item.base_url)} default_city=${safe(item.default_city)}`
        );
      }
      if (ev === 'rag_retrieved') {
        return formatRagPayload(item);
      }
      if (ev === 'rag_skipped') {
        return `ℹ️ 三国预检索跳过：source=${safe(item.source)} reason=${safe(item.reason)}（话里无三国关键词则不预查）`;
      }
      if (ev === 'fc_invoke_system_messages') {
        const blocks = Array.isArray(item.system_blocks) ? item.system_blocks : [];
        return (
          `✅ invoke 前 SystemMessage：round=${safe(item.round)} blocks=${blocks.length} ` +
          `total_messages=${safe(item.total_messages)} roles=${safe(item.roles)}（全文见右侧栏分块）`
        );
      }
      if (ev === 'assistant_round') {
        const c = Number(item.tool_calls_count || 0);
        if (c > 0) {
          return `⏳ LLM round=${safe(item.round)}：tool_calls=${c}（Function Calling，等待工具返回）`;
        }
        return `✅ LLM round=${safe(item.round)}：tool_calls=0（无工具，本轮即最终生成）`;
      }
      if (ev === 'tool_call') {
        return `⏳ tool_call：round=${safe(item.round)} name=${safe(item.name)} args=${safeJson(item.args)}`;
      }
      if (ev === 'tool_result') {
        return summarizeToolResult(item);
      }
      if (ev === 'tool_error' || ev === 'tool_exception') {
        const evn = ev === 'tool_exception' ? 'tool_exception' : 'tool_error';
        return `❌ ${evn}：name=${safe(item.name)} round=${safe(item.round)} error=${safe(item.error)}`;
      }
      if (ev === 'final_answer') {
        return `✅ final_answer：round=${safe(item.round)} content=${safe(item.content)}`;
      }
      if (ev === 'llm_error') {
        return `❌ LLM 异常：phase=chat_with_tools error=${safe(item.error)}`;
      }
      if (ev === 'rule_off') {
        return '⚠️ LLM_MODE=off：不请求模型，仅返回兜底提示（单测/CI 默认）';
      }
      if (ev === 'max_rounds_reached') {
        return `⚠️ FC 终止：max_tool_rounds=${safe(item.max_rounds)}（防止 tool 死循环）`;
      }
      if (ev === 'frontend_error') {
        return `❌ 前端错误：${safe(item.message)}`;
      }
      return `${ev}: ${safeJson(item)}`;
    }

    function formatRagPayload(item) {
      const hits = Array.isArray(item.hits) ? item.hits : [];
      const isSanguo = String(item.source || '') === 'sanguo_kb';
      const lib = isSanguo ? '三国知识库' : '资料';
      const bySemantic =
        String(item.rag_status || '').includes('ok') ||
        String(item.retrieval_engine || '') === 'semantic';
      const route = bySemantic ? 'semantic' : 'lexical';
      const routeHuman = bySemantic
        ? 'embedding→向量→余弦相似度'
        : '关键词打分（无 embedding）';
      const emb = safe(item.embedding_model || item.rag_config_model || '-');
      const lines = [];
      lines.push(
        `✅ 预检索完成：库=${lib} query「${safe(item.query)}」 route=${route}（${routeHuman}） ` +
          `top_k=${hits.length} embedding_model=${emb}，下列为前 3 条参考`
      );
      hits.slice(0, 3).forEach((x, i) => {
        const loc = [x.province, x.modern_city].filter(Boolean).join(' · ') || '—';
        lines.push(`  ${i + 1}. ${safe(x.name)}（${safe(loc)}）`);
      });
      if (item.rag_hint) lines.push(`  提示：${safe(item.rag_hint)}`);
      const ragLogs = Array.isArray(item.rag_debug_logs) ? item.rag_debug_logs : [];
      if (ragLogs.length > 0) {
        lines.push('  过程摘要：');
        ragLogs.forEach((x) => lines.push(`  · ${safe(x)}`));
      }
      return lines.join('\n');
    }

    function toScore(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return '-';
      return n.toFixed(3);
    }

    function summarizeToolResult(item) {
      const name = safe(item.name);
      const rlogs = Array.isArray(item.rag_debug_logs) ? item.rag_debug_logs : [];
      let parsed = null;
      try {
        parsed = JSON.parse(item.result || 'null');
      } catch (_) {
        parsed = null;
      }
      if (Array.isArray(parsed)) {
        const top1 = parsed[0];
        const topName = top1 ? safe(top1.name) : '-';
        const rr =
          top1 && top1._rerank_score != null && top1._rerank_score !== undefined;
        let line = `✅ tool_result：tool=${name} rows=${parsed.length} top1=${topName} rerank=${
          rr ? 'yes（轻量重排）' : 'no'
        }`;
        if (rlogs.length > 0) {
          line += '\n' + rlogs.map((x) => `  · ${safe(x)}`).join('\n');
        }
        return line;
      }
      if (parsed && typeof parsed === 'object') {
        let line = `✅ tool_result：tool=${name} shape=json_object`;
        if (rlogs.length > 0) {
          line += '\n' + rlogs.map((x) => `  · ${safe(x)}`).join('\n');
        }
        return line;
      }
      if (rlogs.length > 0) {
        return (
          `✅ tool_result：tool=${name} shape=raw（未解析为 JSON）\n` +
          rlogs.map((x) => `  · ${safe(x)}`).join('\n')
        );
      }
      return `✅ tool_result：tool=${name} shape=raw`;
    }

    function safe(v) {
      if (v === null || v === undefined) return '-';
      return String(v);
    }

    function safeJson(v) {
      try {
        return JSON.stringify(v, null, 2);
      } catch (_) {
        return String(v);
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });

    document.getElementById('chips').addEventListener('click', (e) => {
      const t = e.target;
      if (t.matches('.chip[data-msg]')) {
        sendMessage(t.getAttribute('data-msg'));
      }
    });

    // 从地址栏 ?message= &city= 带入（UTF-8 百分号编码由服务端已解码；与 uvicorn 日志里的 %XX 不是同一层）
    (function applyQueryDefaults() {
      if (INITIAL_CITY) {
        for (const opt of cityEl.options) {
          if (opt.value === INITIAL_CITY) {
            cityEl.value = INITIAL_CITY;
            break;
          }
        }
      }
      if (INITIAL_MESSAGE) {
        messageEl.value = INITIAL_MESSAGE;
        sendMessage(INITIAL_MESSAGE);
      }
    })();
  </script>
</body>
</html>
